<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Multi-Timezone Digital Clock</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; background-color: #f3f3f3; }\n        #clock { font-size: 48px; margin: 20px; }\n        select { font-size: 24px; margin: 10px; }\n        .timezone { font-size: 20px; }\n    </style>\n</head>\n<body>\n    <h1>Multi-Timezone Digital Clock</h1>\n    <div id="clock">00:00:00</div>\n    <select id="timezone-selector">\n        <option value="UTC">UTC</option>\n        <option value="America/New_York">New York</option>\n        <option value="Europe/London">London</option>\n        <option value="Europe/Paris">Paris</option>\n        <option value="Asia/Dubai">Dubai</option>\n        <option value="Asia/Kolkata">Delhi</option>\n        <option value="Asia/Bangkok">Bangkok</option>\n        <option value="Asia/Tokyo">Tokyo</option>\n        <option value="Australia/Sydney">Sydney</option>\n    </select>\n    <div class="timezone">\n        <div id="utc">UTC: 00:00:00</div>\n        <div id="new-york">New York: 00:00:00</div>\n        <div id="london">London: 00:00:00</div>\n        <div id="paris">Paris: 00:00:00</div>\n        <div id="dubai">Dubai: 00:00:00</div>\n        <div id="delhi">Delhi: 00:00:00</div>\n        <div id="bangkok">Bangkok: 00:00:00</div>\n        <div id="tokyo">Tokyo: 00:00:00</div>\n        <div id="sydney">Sydney: 00:00:00</div>\n    </div>\n    <script>\n        function updateClocks() {\n            const select = document.getElementById('timezone-selector');\n            const selectedTimezone = select.value;\n            const utcDate = new Date();\n            const utcTime = utcDate.toUTCString().split(' ')[4];\n            document.getElementById('clock').innerText = utcTime;\n            const options = { timeZone: selectedTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit' };\n            const selectedTime = new Intl.DateTimeFormat([], options).format(utcDate);\n            document.getElementById('clock').innerText = selectedTime;\n            const timezones = ['UTC', 'America/New_York', 'Europe/London', 'Europe/Paris', 'Asia/Dubai', 'Asia/Kolkata', 'Asia/Bangkok', 'Asia/Tokyo', 'Australia/Sydney'];\n            timezones.forEach(tz => {\n                const time = new Intl.DateTimeFormat([], {...options, timeZone: tz}).format(utcDate);\n                document.getElementById(tz.toLowerCase().replace('/', '-')).innerText = `${tz}: ${time}`;\n            });\n        }\n        setInterval(updateClocks, 1000);\n        document.getElementById('timezone-selector').addEventListener('change', updateClocks);\n        updateClocks();\n    <\/script>\n</body>\n</html>
