<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Add News Item</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        form { margin: 20px 0; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 15px; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Add New News Item</h1>
    <form id="newsForm">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>
        <div class="error" id="titleError"></div>

        <label for="content">Content:</label>
        <textarea id="content" name="content" rows="5" required></textarea>
        <div class="error" id="contentError"></div>

        <button type="submit">Add News Item</button>
    </form>

    <script>
        const form = document.getElementById('newsForm');
        form.onsubmit = function(event) {
            let valid = true;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;

            document.getElementById('titleError').innerText = '';
            document.getElementById('contentError').innerText = '';

            if (title.length < 5) {
                document.getElementById('titleError').innerText = 'Title must be at least 5 characters long.';
                valid = false;
            }

            if (content.length < 20) {
                document.getElementById('contentError').innerText = 'Content must be at least 20 characters long.';
                valid = false;
            }

            if (!valid) {
                event.preventDefault(); // Prevent form submission
            }
        };
    </script>
</body>
</html>
